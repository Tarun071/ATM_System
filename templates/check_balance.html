<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check Balance</title>

<style>

:root{
    --bg:#0F172A;
    --card:#1E293B;
    --primary:#2563EB;
    --primary-hover:#1D4ED8;
    --success:#22C55E;
    --text:#F8FAFC;
    --muted:#94A3B8;
    --border:#334155;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:var(--bg);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:450px;
    background:var(--card);
    padding:40px;
    border-radius:20px;
    border:1px solid var(--border);
    box-shadow:0 20px 40px rgba(0,0,0,.35);
    text-align:center;
}

.icon{
    font-size:60px;
    margin-bottom:15px;
}

h1{
    color:var(--text);
    margin-bottom:10px;
}

.subtitle{
    color:var(--muted);
    margin-bottom:25px;
}

.balance-card{
    background:#0F172A;
    border:1px solid var(--border);
    border-radius:15px;
    padding:25px;
    margin-bottom:25px;
}

.balance-label{
    color:var(--muted);
    font-size:14px;
}

.balance{
    color:var(--success);
    font-size:36px;
    font-weight:bold;
    margin-top:10px;
}

.btn{
    display:block;
    text-decoration:none;
    background:var(--primary);
    color:white;
    padding:14px;
    border-radius:10px;
    font-weight:600;
    transition:.3s;
}

.btn:hover{
    background:var(--primary-hover);
}

.footer{
    color:var(--muted);
    margin-top:20px;
    font-size:12px;
}

</style>
</head>
<body>

<div class="container">

    <div class="icon">💳</div>

    <h1>Available Balance</h1>

    <p class="subtitle">
        Your current account balance
    </p>

    <div class="balance-card">

        <div class="balance-label">
            Available Funds
        </div>

        <div class="balance">
            ₹ {{ bal }}
        </div>

    </div>

    <a href="/dashboard" class="btn">
        Back to Dashboard
    </a>

    <div class="footer">
        Secure Banking Services
    </div>

</div>

</body>
</html>

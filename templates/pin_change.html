<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change PIN</title>

<style>

:root{
    --bg:#0F172A;
    --card:#1E293B;
    --primary:#2563EB;
    --primary-hover:#1D4ED8;
    --danger:#EF4444;
    --text:#F8FAFC;
    --muted:#94A3B8;
    --border:#334155;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:var(--bg);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:450px;
    background:var(--card);
    padding:35px;
    border-radius:20px;
    border:1px solid var(--border);
    box-shadow:0 20px 40px rgba(0,0,0,.35);
}

.icon{
    text-align:center;
    font-size:55px;
    margin-bottom:10px;
}

h1{
    text-align:center;
    color:var(--text);
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:var(--muted);
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border-radius:10px;
    border:1px solid var(--border);
    background:#0F172A;
    color:var(--text);
    font-size:16px;
}

input:focus{
    outline:none;
    border-color:var(--primary);
}

input::placeholder{
    color:var(--muted);
}

.buttons{
    display:flex;
    gap:12px;
}

.btn{
    flex:1;
    padding:14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
    transition:.3s;
}

.change{
    background:var(--primary);
    color:white;
}

.change:hover{
    background:var(--primary-hover);
}

.back{
    background:var(--danger);
    color:white;
    text-decoration:none;
    display:flex;
    justify-content:center;
    align-items:center;
}

.back:hover{
    background:#DC2626;
}


</style>
</head>
<body>

<div class="container">

    <div class="icon">🔒</div>

    <h1>Change PIN</h1>

    <p class="subtitle">
        Update your ATM PIN securely
    </p>

    <form action="/pin_change" method="POST">

        <input
            type="text"
            name="old_pin"
            placeholder="Current PIN"
            required
        >

        <input
            type="text"
            name="new_pin"
            placeholder="New PIN"
            required
        >

        <div class="buttons">

            <button class="btn change" type="submit">
                Change PIN
            </button>

            <a href="/dashboard" class="btn back">
                Back
            </a>
     
        </div>
        {% if error %}
        <p style="color: red; text-align: center;">{{error}}</p>
        {% endif %}

    </form>

    

</div>

</body>
</html>
